name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install
        run: npm ci

      - name: Convex codegen drift check
        working-directory: apps/web
        run: |
          npx convex codegen --system-udfs --typecheck disable
          git diff --exit-code

      - name: DocType codegen drift check
        run: |
          npm run gen:doctypes
          git diff --exit-code

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Typecheck
        run: npm run typecheck

      - name: Test (coverage-gated)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Generated files drift check
        run: git diff --exit-code
